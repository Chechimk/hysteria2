<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Xray Control Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a13;--card:#0d1220;--card2:#111827;--border:#1e293b;--accent:#6366f1;--accent2:#4f46e5;--green:#10b981;--red:#ef4444;--yellow:#eab308;--cyan:#06b6d4;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--r:10px}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at top,#111827 0%,var(--bg) 70%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center}
.login-card .logo{font-size:40px;margin-bottom:8px}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:4px}
.login-card p{color:var(--text3);font-size:13px;margin-bottom:28px}
.login-card input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px;transition:border .2s}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.login-card button:hover{opacity:.9}
.login-err{color:var(--red);font-size:12px;margin-bottom:10px;display:none}
.dash{display:none;max-width:1400px;margin:0 auto;padding:24px 20px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700}
.brand span{color:var(--accent)}
.hdr-btns{display:flex;gap:8px}
.btn{padding:7px 14px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent2)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{border-color:var(--text3)}
.btn-d{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-s{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}.btn-s:hover{background:rgba(16,185,129,.2)}
.btn-c{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}.btn-c:hover{background:rgba(6,182,212,.2)}
.btn-sm{padding:5px 10px;font-size:11px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc:nth-child(1)::after{background:var(--accent)}.sc:nth-child(2)::after{background:var(--green)}.sc:nth-child(3)::after{background:var(--yellow)}.sc:nth-child(4)::after{background:var(--cyan)}
.sc .lb{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.sc .vl{font-size:28px;font-weight:800}
.sc:nth-child(1) .vl{color:var(--accent)}.sc:nth-child(2) .vl{color:var(--green)}.sc:nth-child(3) .vl{color:var(--yellow)}.sc:nth-child(4) .vl{color:var(--cyan)}
.settings{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px;display:none}
.settings h3{font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;margin-top:12px}
input,select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;min-height:28px}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:var(--accent);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500}
.tag .x{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;line-height:1;padding:0}
.row{display:flex;gap:8px;align-items:flex-end}.row>:first-child{flex:1}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-sel{width:auto;padding:6px 10px;font-size:11px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer}
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:11px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--card2)}
td{padding:10px 14px;border-bottom:1px solid rgba(30,41,59,.5);font-size:13px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(99,102,241,.03)}
.uid{font-family:'Cascadia Code',Consolas,monospace;font-size:10px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-on{background:rgba(16,185,129,.12);color:var(--green)}
.badge-off{background:rgba(239,68,68,.12);color:var(--red)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.dot-off{background:#374151}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.acts{display:flex;gap:4px;flex-wrap:wrap}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.traf{font-family:'Cascadia Code',Consolas,monospace;font-size:10px;line-height:1.6}
.traf .up{color:var(--green)}.traf .dn{color:var(--cyan)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mo.show{display:flex}
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mc h2{font-size:16px;margin-bottom:16px}
.mc-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.lbox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;word-break:break-all;font-family:monospace;font-size:11px;color:var(--cyan);margin:8px 0;line-height:1.6}
.link-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.link-row label{margin:0;min-width:50px}
.link-row input,.link-row select{flex:1}
.link-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.link-item .lname{font-weight:600;font-size:12px;color:var(--accent);margin-bottom:4px}
.link-item .lurl{font-family:monospace;font-size:10px;color:var(--cyan);word-break:break-all;line-height:1.5}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:300;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green);color:#fff}
.toast.err{background:var(--red);color:#fff}
@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.stats{grid-template-columns:1fr}table{display:block;overflow-x:auto}header{flex-direction:column;align-items:flex-start;gap:10px}}
</style>
</head>
<body>

<div class="login-wrap" id="loginPage">
<div class="login-card">
  <div class="logo">⚡</div>
  <h1>Xray Control Panel</h1>
  <p>Enter admin password to continue</p>
  <div class="login-err" id="loginErr">Invalid password</div>
  <input type="password" id="loginPass" placeholder="Password" autofocus>
  <button onclick="login()">Sign In</button>
</div>
</div>

<div class="dash" id="dash">
<header>
  <div class="brand">⚡ <span>Xray</span> Control Panel</div>
  <div class="hdr-btns">
    <button class="btn btn-g" onclick="toggleSettings()">⚙ Settings</button>
    <button class="btn btn-g" onclick="logout()">Logout</button>
  </div>
</header>

<div class="stats">
  <div class="sc"><div class="lb">Total Users</div><div class="vl" id="sT">0</div></div>
  <div class="sc"><div class="lb">Active</div><div class="vl" id="sA">0</div></div>
  <div class="sc"><div class="lb">Inactive</div><div class="vl" id="sI">0</div></div>
  <div class="sc"><div class="lb">Online Now</div><div class="vl" id="sO">0</div></div>
</div>

<div class="settings" id="setPanel">
  <h3>⚙ Server Settings</h3>
  <label>CDN Address</label>
  <input type="text" id="sCdn" placeholder="m.googleapis.com">
  <label>SNI Domains</label>
  <div class="tags" id="sniTags"></div>
  <div class="row"><input type="text" id="nSni" placeholder="e.g. workspaceblog.google.com" style="margin:0"><button class="btn btn-p btn-sm" onclick="addTag('sni')">+ Add</button></div>
  <label>Host URLs (Cloud Run)</label>
  <div class="tags" id="hostTags"></div>
  <div class="row"><input type="text" id="nHost" placeholder="e.g. my-service.run.app" style="margin:0"><button class="btn btn-p btn-sm" onclick="addTag('host')">+ Add</button></div>
  <div style="margin-top:16px"><button class="btn btn-p" onclick="saveSettings()">Save Settings</button></div>
</div>

<div class="toolbar">
  <button class="btn btn-p" onclick="showAdd()">+ New User</button>
  <button class="btn btn-g" onclick="loadUsers()">↻ Refresh</button>
  <select class="filter-sel" id="tfPeriod" onchange="loadTraffic()">
    <option value="live">Live (this session)</option>
    <option value="1h">Last 1 Hour</option>
    <option value="2h">Last 2 Hours</option>
    <option value="3h">Last 3 Hours</option>
    <option value="4h">Last 4 Hours</option>
    <option value="5h">Last 5 Hours</option>
    <option value="daily" selected>Last 24 Hours</option>
    <option value="weekly">Last 7 Days</option>
    <option value="monthly">Last 30 Days</option>
    <option value="yearly">Last Year</option>
  </select>
</div>

<div class="tw">
  <table>
    <thead><tr><th>Owner</th><th>Links</th><th>Status</th><th>Online</th><th>↑ Upload</th><th>↓ Download</th><th>Actions</th></tr></thead>
    <tbody id="tbl"></tbody>
  </table>
</div>
</div>

<!-- CREATE USER MODAL -->
<div class="mo" id="addMo">
<div class="mc">
  <h2>Create New User</h2>
  <label>Owner Name</label>
  <input type="text" id="cOwner" placeholder="Who owns this account?">
  <label>Base Link Name</label>
  <input type="text" id="cBase" placeholder="e.g. pew (creates pew1, pew2, pew3, pew4)">
  <label style="margin-top:16px">Assign SNI for each link:</label>
  <div id="cLinks"></div>
  <div class="mc-foot">
    <button class="btn btn-g" onclick="closeMo('addMo')">Cancel</button>
    <button class="btn btn-p" onclick="createUser()">Create</button>
  </div>
</div>
</div>

<!-- VIEW LINKS MODAL -->
<div class="mo" id="linkMo">
<div class="mc">
  <h2 id="linkTitle">Links</h2>
  <label>Host URL</label>
  <select id="lHost" onchange="renderLinks()"></select>
  <div id="linkList" style="margin-top:12px"></div>
  <div class="mc-foot">
    <button class="btn btn-g" onclick="closeMo('linkMo')">Close</button>
    <button class="btn btn-c" onclick="copyAll()">📋 Copy All Links</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let users=[],settings={},onlineSet=new Set(),poll;
let trafficData={};
let currentPeriod='live';
let viewUser=null;

// AUTH
async function login(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('loginPass').value})});
  if(r.ok)initDash();else $('loginErr').style.display='block';
}
$('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
async function logout(){await fetch('/api/logout',{method:'POST'});stopPoll();$('dash').style.display='none';$('loginPage').style.display='flex';$('loginPass').value='';}

async function initDash(){
  const r=await fetch('/api/settings');
  if(r.status===401)return;
  settings=await r.json();
  $('loginPage').style.display='none';$('dash').style.display='block';
  renderSet();loadUsers();startPoll();
}

// POLL
function startPoll(){stopPoll();pollStats();poll=setInterval(pollStats,5000);}
function stopPoll(){if(poll)clearInterval(poll);}
async function pollStats(){
  try{
    const r=await fetch('/api/stats');if(!r.ok)return;
    const d=await r.json();
    onlineSet=new Set(d.online||[]);
    if(currentPeriod==='live') trafficData=d.traffic||{};
    updateTable();
  }catch(e){}
}
async function loadTraffic(){
  currentPeriod=$('tfPeriod').value;
  if(currentPeriod==='live'){pollStats();return;}
  try{
    const r=await fetch('/api/traffic?period='+currentPeriod);if(!r.ok)return;
    const d=await r.json();trafficData=d.traffic||{};updateTable();
  }catch(e){}
}

function updateTable(){
  let onCnt=0;
  document.querySelectorAll('[data-uid]').forEach(el=>{
    const uid=el.dataset.uid;
    const on=onlineSet.has(uid);
    el.querySelector('.dot').className='dot '+(on?'dot-on':'dot-off');
    el.querySelector('.otxt').textContent=on?'Online':'Offline';
    const t=trafficData[uid]||{up:0,down:0};
    el.querySelector('.tup').textContent=fmtBytes(t.up);
    el.querySelector('.tdn').textContent=fmtBytes(t.down);
    if(on)onCnt++;
  });
  $('sO').textContent=onCnt;
}

// SETTINGS
function renderSet(){
  $('sCdn').value=settings.cdnAddress||'m.googleapis.com';
  rTags('sniTags',settings.sniList||[],'sni');
  rTags('hostTags',settings.hostUrls||[],'host');
}
function rTags(id,list,t){$(id).innerHTML=list.map((v,i)=>`<span class="tag">${esc(v)}<button class="x" onclick="rmTag('${t}',${i})">✕</button></span>`).join('');}
function addTag(t){
  const el=t==='sni'?$('nSni'):$('nHost'),v=el.value.trim();if(!v)return;
  if(t==='sni'){(settings.sniList=settings.sniList||[]).push(v);rTags('sniTags',settings.sniList,'sni');}
  else{(settings.hostUrls=settings.hostUrls||[]).push(v);rTags('hostTags',settings.hostUrls,'host');}
  el.value='';
}
function rmTag(t,i){
  if(t==='sni'){settings.sniList.splice(i,1);rTags('sniTags',settings.sniList,'sni');}
  else{settings.hostUrls.splice(i,1);rTags('hostTags',settings.hostUrls,'host');}
}
async function saveSettings(){
  settings.cdnAddress=$('sCdn').value.trim();
  const r=await fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(settings)});
  toast(r.ok?'Settings saved':'Failed',!r.ok);
}
function toggleSettings(){const p=$('setPanel');p.style.display=p.style.display==='none'?'block':'none';}

// USERS TABLE
async function loadUsers(){
  const r=await fetch('/api/users');if(!r.ok)return;
  const d=await r.json();users=d.users;
  const ac=users.filter(u=>u.active).length;
  $('sT').textContent=users.length;$('sA').textContent=ac;$('sI').textContent=users.length-ac;
  renderUsers();
}
function renderUsers(){
  if(!users.length){$('tbl').innerHTML='<tr><td colspan="7" class="empty">No users yet. Click "+ New User" to create one.</td></tr>';return;}
  $('tbl').innerHTML=users.map(u=>{
    const on=onlineSet.has(u.uuid);
    const t=trafficData[u.uuid]||{up:0,down:0};
    const linkNames=(u.links||[]).map(l=>l.name).join(', ');
    return`<tr data-uid="${u.uuid}">
      <td><strong>${esc(u.owner||u.name||'')}</strong></td>
      <td><span class="uid">${esc(linkNames)||u.uuid.slice(0,13)+'...'}</span></td>
      <td><span class="badge ${u.active?'badge-on':'badge-off'}">${u.active?'Active':'Disabled'}</span></td>
      <td><span class="dot ${on?'dot-on':'dot-off'}"></span> <span class="otxt">${on?'Online':'Offline'}</span></td>
      <td class="traf"><span class="up tup">${fmtBytes(t.up)}</span></td>
      <td class="traf"><span class="dn tdn">${fmtBytes(t.down)}</span></td>
      <td><div class="acts">
        ${u.active?`<button class="btn btn-c btn-sm" onclick="showLinks('${u.uuid}')">📋 Links</button>`:''}
        <button class="btn ${u.active?'btn-g':'btn-s'} btn-sm" onclick="toggle('${u.uuid}',${!u.active})">${u.active?'Disable':'Enable'}</button>
        <button class="btn btn-d btn-sm" onclick="del('${u.uuid}','${esc(u.owner||u.name||'')}')">Delete</button>
      </div></td>
    </tr>`}).join('');
}

// CREATE USER
function showAdd(){
  $('cOwner').value='';$('cBase').value='';$('cLinks').innerHTML='';
  buildLinkInputs();
  $('addMo').classList.add('show');$('cOwner').focus();
}

$('cBase').addEventListener('input', buildLinkInputs);

function buildLinkInputs(){
  const base=$('cBase').value.trim();
  const sniList=settings.sniList||[];
  let html='';
  for(let i=1;i<=4;i++){
    const name=base?base+i:'link'+i;
    html+=`<div class="link-row">
      <label style="font-size:12px;color:var(--text);font-weight:600">${esc(name)}</label>
      <select class="link-sni" data-idx="${i}" style="flex:1">
        ${sniList.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}
      </select>
    </div>`;
  }
  $('cLinks').innerHTML=html;
}

async function createUser(){
  const owner=$('cOwner').value.trim();
  const baseName=$('cBase').value.trim();
  if(!owner)return toast('Owner name is required',true);
  if(!baseName)return toast('Base name is required',true);
  const sniSelects=document.querySelectorAll('.link-sni');
  const links=[];
  sniSelects.forEach((sel,i)=>{
    links.push({name:baseName+(i+1), sni:sel.value});
  });
  if(!links.length||!links[0].sni)return toast('Please configure SNI for links',true);
  const r=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner,baseName,links})});
  if(r.ok){closeMo('addMo');loadUsers();toast('User created with '+links.length+' links');}
  else{const d=await r.json();toast(d.error||'Failed',true);}
}

// VIEW LINKS
function showLinks(uuid){
  viewUser=users.find(u=>u.uuid===uuid);
  if(!viewUser)return;
  $('linkTitle').textContent=`Links for ${viewUser.owner||viewUser.name}`;
  const hs=$('lHost');
  hs.innerHTML=(settings.hostUrls||[]).map(h=>`<option>${esc(h)}</option>`).join('');
  renderLinks();
  $('linkMo').classList.add('show');
}

function renderLinks(){
  if(!viewUser)return;
  const host=$('lHost').value;
  const cdn=settings.cdnAddress||'m.googleapis.com';
  const links=viewUser.links||[];
  $('linkList').innerHTML=links.map(l=>{
    const url=`vless://${viewUser.uuid}@${cdn}:443?path=%2F${viewUser.uuid}&security=tls&encryption=none&host=${host}&type=ws&sni=${l.sni}#${encodeURIComponent(l.name)}`;
    return`<div class="link-item">
      <div class="lname">${esc(l.name)} — SNI: ${esc(l.sni)}</div>
      <div class="lurl">${esc(url)}</div>
    </div>`;
  }).join('');
}

function copyAll(){
  if(!viewUser)return;
  const host=$('lHost').value;
  const cdn=settings.cdnAddress||'m.googleapis.com';
  const links=(viewUser.links||[]).map(l=>`vless://${viewUser.uuid}@${cdn}:443?path=%2F${viewUser.uuid}&security=tls&encryption=none&host=${host}&type=ws&sni=${l.sni}#${encodeURIComponent(l.name)}`);
  navigator.clipboard.writeText(links.join('\n')).then(()=>toast('All '+links.length+' links copied!'));
}

// TOGGLE & DELETE
async function toggle(id,active){
  await fetch('/api/users/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({active})});
  loadUsers();toast(active?'User enabled':'User disabled');
}
async function del(id,name){
  if(!confirm('Permanently delete "'+name+'"?'))return;
  const r=await fetch('/api/users/'+id,{method:'DELETE'});
  if(r.ok){loadUsers();toast('User deleted');}
}

// HELPERS
function $(id){return document.getElementById(id)}
function closeMo(id){$(id).classList.remove('show');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m,e){const t=$('toast');t.textContent=m;t.className='toast show '+(e?'err':'ok');setTimeout(()=>t.className='toast',2500);}
function fmtBytes(b){if(!b||b===0)return '0 B';const u=['B','KB','MB','GB','TB'];const i=Math.floor(Math.log(b)/Math.log(1024));return (b/Math.pow(1024,i)).toFixed(i>0?1:0)+' '+u[i];}
document.querySelectorAll('.mo').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')}));
initDash();
