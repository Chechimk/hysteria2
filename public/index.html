<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xray Admin Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0d17;--card:#141627;--border:#1e2140;--accent:#6366f1;--accent-hover:#4f46e5;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--radius:12px}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:400px;text-align:center}
.login-box h1{font-size:24px;margin-bottom:8px}
.login-box p{color:var(--text2);margin-bottom:24px;font-size:14px}
.login-box input{width:100%;padding:12px 16px;background:#0b0d17;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;margin-bottom:16px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.login-box button:hover{background:var(--accent-hover)}
.login-error{color:var(--red);font-size:13px;margin-bottom:12px;display:none}
/* DASHBOARD */
.dashboard{display:none;max-width:1200px;margin:0 auto;padding:20px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
header h1{font-size:22px;display:flex;align-items:center;gap:10px}
header h1 span{color:var(--accent)}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-success{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}.btn-success:hover{background:rgba(16,185,129,.25)}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-card .label{font-size:13px;color:var(--text2);margin-bottom:6px}
.stat-card .value{font-size:32px;font-weight:700}
.stat-card .value.green{color:var(--green)}.stat-card .value.yellow{color:var(--yellow)}.stat-card .value.accent{color:var(--accent)}
/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:14px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);border-bottom:1px solid var(--border);background:#0f1125}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(99,102,241,.04)}
.uuid{font-family:'Cascadia Code',Consolas,monospace;font-size:12px;color:var(--text2)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:rgba(16,185,129,.15);color:var(--green)}
.badge-inactive{background:rgba(239,68,68,.15);color:var(--red)}
.actions{display:flex;gap:6px;flex-wrap:wrap}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:440px}
.modal h2{margin-bottom:20px;font-size:18px}
.modal label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.modal input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:16px}
.modal input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--red)}
/* LINK DISPLAY */
.link-modal .link-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;word-break:break-all;font-family:monospace;font-size:12px;color:var(--accent);margin-bottom:16px;max-height:120px;overflow-y:auto}
/* RESPONSIVE */
@media(max-width:768px){
  table{display:block;overflow-x:auto}
  .stats{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr}
  header h1{font-size:18px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>⚡ Xray Admin</h1>
    <p>Enter admin password to continue</p>
    <div class="login-error" id="loginError">Invalid password</div>
    <input type="password" id="loginPass" placeholder="Password" autofocus>
    <button onclick="login()">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>
    <h1>⚡ <span>Xray</span> Admin Panel</h1>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="downloadConfig()">⬇ Config</button>
      <button class="btn btn-ghost" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card"><div class="label">Total Users</div><div class="value accent" id="statTotal">0</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value green" id="statActive">0</div></div>
    <div class="stat-card"><div class="label">Inactive</div><div class="value yellow" id="statInactive">0</div></div>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="showAddModal()">+ Add User</button>
    <button class="btn btn-ghost" onclick="loadUsers()">↻ Refresh</button>
    <button class="btn btn-ghost" onclick="toggleSettings()">⚙ Settings</button>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="table-wrap" id="settingsPanel" style="display:none;margin-bottom:20px;padding:20px">
    <h3 style="margin-bottom:16px;font-size:16px">⚙ Server Settings</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:600px">
      <div>
        <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:6px">Xray Host (Cloud Run URL)</label>
        <input type="text" id="settingsHost" placeholder="your-service.run.app" style="width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none">
      </div>
      <div>
        <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:6px">gRPC Service Name</label>
        <input type="text" id="settingsGrpc" placeholder="vlessgrpc" style="width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none">
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="saveSettings()">Save Settings</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>UUID</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>
</div>

<!-- ADD USER MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add New User</h2>
    <label>Display Name (optional)</label>
    <input type="text" id="newUserName" placeholder="e.g. John">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addUser()">Create User</button>
    </div>
  </div>
</div>

<!-- LINK MODAL -->
<div class="modal-overlay link-modal" id="linkModal">
  <div class="modal">
    <h2>Import Link</h2>
    <div class="link-box" id="linkBox"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('linkModal')">Close</button>
      <button class="btn btn-success" onclick="copyLink()">📋 Copy Link</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let users = [];
let settings = {};
let currentLink = '';

// --- Auth ---
async function login() {
  const pass = document.getElementById('loginPass').value;
  const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({password:pass}) });
  if (res.ok) { init(); }
  else { document.getElementById('loginError').style.display='block'; }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

async function logout() {
  await fetch('/api/logout', {method:'POST'});
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPass').value='';
}

// --- Init ---
async function init() {
  try {
    const sRes = await fetch('/api/settings');
    if (sRes.status === 401) return;
    settings = await sRes.json();
    document.getElementById('loginPage').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('settingsHost').value = settings.xrayHost || '';
    document.getElementById('settingsGrpc').value = settings.grpcService || 'vlessgrpc';
    loadUsers();
  } catch(e) {}
}

// --- Settings ---
function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function saveSettings() {
  const xrayHost = document.getElementById('settingsHost').value.trim();
  const grpcService = document.getElementById('settingsGrpc').value.trim();
  const res = await fetch('/api/settings', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({xrayHost, grpcService})});
  if (res.ok) { settings.xrayHost = xrayHost; settings.grpcService = grpcService; toast('Settings saved'); }
  else toast('Failed to save settings', true);
}

// --- Users ---
async function loadUsers() {
  try {
    const res = await fetch('/api/users');
    if (!res.ok) return;
    users = await res.json();
    renderUsers();
  } catch(e) { toast('Failed to load users', true); }
}

function renderUsers() {
  const total = users.length;
  const active = users.filter(u => u.active).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statInactive').textContent = total - active;

  const tb = document.getElementById('userTable');
  tb.innerHTML = users.map(u => `
    <tr>
      <td><strong>${esc(u.name)}</strong></td>
      <td><span class="uuid">${u.uuid}</span></td>
      <td><span class="badge ${u.active?'badge-active':'badge-inactive'}">${u.active?'Active':'Inactive'}</span></td>
      <td style="color:var(--text2);font-size:13px">${new Date(u.createdAt).toLocaleDateString()}</td>
      <td>
        <div class="actions">
          <button class="btn btn-success btn-sm" onclick="showLink('${u.uuid}','${esc(u.name)}')">📋 Link</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleUser('${u.uuid}',${!u.active})">${u.active?'Disable':'Enable'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.uuid}','${esc(u.name)}')">✕</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// --- Add ---
function showAddModal() {
  document.getElementById('newUserName').value='';
  document.getElementById('addModal').classList.add('show');
  document.getElementById('newUserName').focus();
}

async function addUser() {
  const name = document.getElementById('newUserName').value.trim();
  const res = await fetch('/api/users', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
  if (res.ok) { closeModal('addModal'); loadUsers(); toast('User created'); }
  else toast('Failed to create user', true);
}

// --- Delete ---
async function deleteUser(id, name) {
  if (!confirm('Delete user "' + name + '"?')) return;
  const res = await fetch('/api/users/' + id, {method:'DELETE'});
  if (res.ok) { loadUsers(); toast('User deleted'); }
  else toast('Failed to delete', true);
}

// --- Toggle ---
async function toggleUser(id, active) {
  const res = await fetch('/api/users/' + id, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({active})});
  if (res.ok) { loadUsers(); toast(active ? 'User enabled' : 'User disabled'); }
}

// --- Link ---
function generateVlessLink(uuid, name) {
  const h = settings.xrayHost;
  const s = settings.grpcService;
  return `vless://${uuid}@${h}:443?encryption=none&type=grpc&serviceName=${s}&security=tls&sni=${h}#${encodeURIComponent(name)}`;
}

function showLink(uuid, name) {
  currentLink = generateVlessLink(uuid, name);
  document.getElementById('linkBox').textContent = currentLink;
  document.getElementById('linkModal').classList.add('show');
}

function copyLink() {
  navigator.clipboard.writeText(currentLink).then(() => toast('Link copied!'));
}

// --- Config ---
async function downloadConfig() {
  const res = await fetch('/api/config');
  const data = await res.json();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.json';
  a.click();
  toast('Config downloaded');
}

// --- Helpers ---
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('show'); });
});

// Check auth on load
init();
</script>
</body>
</html>
