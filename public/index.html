<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xray Admin Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0d17;--card:#141627;--border:#1e2140;--accent:#6366f1;--accent-hover:#4f46e5;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--radius:12px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:400px;text-align:center}
.login-box h1{font-size:24px;margin-bottom:8px}.login-box p{color:var(--text2);margin-bottom:24px;font-size:14px}
.login-error{color:var(--red);font-size:13px;margin-bottom:12px;display:none}
input,select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:var(--accent)}
.dashboard{display:none;max-width:1200px;margin:0 auto;padding:20px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
header h1{font-size:22px}header h1 span{color:var(--accent)}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-success{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}.btn-success:hover{background:rgba(16,185,129,.25)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-card .label{font-size:13px;color:var(--text2);margin-bottom:4px}.stat-card .value{font-size:28px;font-weight:700}
.stat-card .value.green{color:var(--green)}.stat-card .value.yellow{color:var(--yellow)}.stat-card .value.accent{color:var(--accent)}
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);border-bottom:1px solid var(--border);background:#0f1125}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(99,102,241,.04)}
.uuid{font-family:Consolas,monospace;font-size:11px;color:var(--text2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:rgba(16,185,129,.15);color:var(--green)}.badge-inactive{background:rgba(239,68,68,.15);color:var(--red)}
.actions{display:flex;gap:5px;flex-wrap:wrap}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:16px;font-size:17px}
.modal label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:10px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.settings-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:none}
.settings-panel h3{font-size:15px;margin-bottom:14px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(99,102,241,.15);color:var(--accent);padding:4px 10px;border-radius:6px;font-size:12px}
.tag button{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 2px}
.link-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;word-break:break-all;font-family:monospace;font-size:11px;color:var(--accent);margin:12px 0;max-height:100px;overflow-y:auto}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}.toast.error{background:var(--red)}
.row{display:flex;gap:10px;align-items:flex-end}.row>*{flex:1}
@media(max-width:768px){table{display:block;overflow-x:auto}.stats{grid-template-columns:1fr 1fr}.row{flex-direction:column}}
</style>
</head>
<body>

<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>⚡ Xray Admin</h1>
    <p>Enter admin password</p>
    <div class="login-error" id="loginError">Invalid password</div>
    <input type="password" id="loginPass" placeholder="Password" autofocus>
    <button class="btn btn-primary" style="width:100%;padding:12px" onclick="login()">Sign In</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <header>
    <h1>⚡ <span>Xray</span> Admin Panel</h1>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="toggleSettings()">⚙ Settings</button>
      <button class="btn btn-ghost" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card"><div class="label">Total Slots</div><div class="value accent" id="statTotal">30</div></div>
    <div class="stat-card"><div class="label">Assigned</div><div class="value green" id="statAssigned">0</div></div>
    <div class="stat-card"><div class="label">Available</div><div class="value yellow" id="statAvailable">30</div></div>
  </div>

  <!-- SETTINGS -->
  <div class="settings-panel" id="settingsPanel">
    <h3>⚙ Server Settings</h3>
    <label>CDN Address</label>
    <input type="text" id="setCdn" placeholder="m.googleapis.com">

    <label>SNI Domains</label>
    <div class="tag-list" id="sniTags"></div>
    <div class="row">
      <input type="text" id="newSni" placeholder="e.g. workspaceblog.google.com" style="margin:0">
      <button class="btn btn-primary btn-sm" onclick="addSni()" style="white-space:nowrap">+ Add SNI</button>
    </div>

    <label style="margin-top:14px">Host URLs (Cloud Run)</label>
    <div class="tag-list" id="hostTags"></div>
    <div class="row">
      <input type="text" id="newHost" placeholder="e.g. v2ray30-xxx.europe-west1.run.app" style="margin:0">
      <button class="btn btn-primary btn-sm" onclick="addHost()" style="white-space:nowrap">+ Add URL</button>
    </div>

    <button class="btn btn-primary" style="margin-top:16px" onclick="saveSettings()">Save Settings</button>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="showAddModal()">+ Add User</button>
    <button class="btn btn-ghost" onclick="loadUsers()">↻ Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>UUID</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>
</div>

<!-- ADD USER MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add New User</h2>
    <label>Display Name</label>
    <input type="text" id="newUserName" placeholder="e.g. John">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addUser()">Create User</button>
    </div>
  </div>
</div>

<!-- LINK MODAL -->
<div class="modal-overlay" id="linkModal">
  <div class="modal">
    <h2>Import Link</h2>
    <label>SNI Domain</label>
    <select id="linkSni"></select>
    <label>Host URL (Cloud Run)</label>
    <select id="linkHost"></select>
    <label>CDN Address</label>
    <input type="text" id="linkCdn" readonly style="color:var(--text2)">
    <div class="link-box" id="linkBox"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('linkModal')">Close</button>
      <button class="btn btn-success" onclick="copyLink()">📋 Copy Link</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let users=[], settings={}, linkUuid='', linkName='';

async function login(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('loginPass').value})});
  if(r.ok)init(); else document.getElementById('loginError').style.display='block';
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')login()});

async function logout(){
  await fetch('/api/logout',{method:'POST'});
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginPage').style.display='flex';
}

async function init(){
  const r=await fetch('/api/settings');
  if(r.status===401)return;
  settings=await r.json();
  document.getElementById('loginPage').style.display='none';
  document.getElementById('dashboard').style.display='block';
  renderSettings();
  loadUsers();
}

// --- Settings ---
function renderSettings(){
  document.getElementById('setCdn').value=settings.cdnAddress||'m.googleapis.com';
  renderTags('sniTags',settings.sniList||[],'sni');
  renderTags('hostTags',settings.hostUrls||[],'host');
}

function renderTags(containerId,list,type){
  document.getElementById(containerId).innerHTML=list.map((v,i)=>
    `<span class="tag">${esc(v)}<button onclick="removeTag('${type}',${i})">✕</button></span>`
  ).join('');
}

function addSni(){
  const v=document.getElementById('newSni').value.trim();
  if(!v)return;
  settings.sniList=settings.sniList||[];
  settings.sniList.push(v);
  document.getElementById('newSni').value='';
  renderTags('sniTags',settings.sniList,'sni');
}

function addHost(){
  const v=document.getElementById('newHost').value.trim();
  if(!v)return;
  settings.hostUrls=settings.hostUrls||[];
  settings.hostUrls.push(v);
  document.getElementById('newHost').value='';
  renderTags('hostTags',settings.hostUrls,'host');
}

function removeTag(type,idx){
  if(type==='sni'){settings.sniList.splice(idx,1);renderTags('sniTags',settings.sniList,'sni');}
  else{settings.hostUrls.splice(idx,1);renderTags('hostTags',settings.hostUrls,'host');}
}

async function saveSettings(){
  settings.cdnAddress=document.getElementById('setCdn').value.trim();
  const r=await fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(settings)});
  if(r.ok)toast('Settings saved'); else toast('Failed',true);
}

function toggleSettings(){
  const p=document.getElementById('settingsPanel');
  p.style.display=p.style.display==='none'?'block':'none';
}

// --- Users ---
async function loadUsers(){
  const r=await fetch('/api/users');
  if(!r.ok)return;
  const data=await r.json();
  users=data.users;
  document.getElementById('statTotal').textContent=data.total;
  document.getElementById('statAssigned').textContent=data.total-data.available;
  document.getElementById('statAvailable').textContent=data.available;
  renderUsers();
}

function renderUsers(){
  document.getElementById('userTable').innerHTML=users.map(u=>`
    <tr>
      <td><strong>${esc(u.name)}</strong></td>
      <td><span class="uuid">${u.uuid}</span></td>
      <td><span class="badge ${u.active?'badge-active':'badge-inactive'}">${u.active?'Active':'Inactive'}</span></td>
      <td style="color:var(--text2);font-size:12px">${new Date(u.createdAt).toLocaleDateString()}</td>
      <td><div class="actions">
        <button class="btn btn-success btn-sm" onclick="showLink('${u.uuid}','${esc(u.name)}')">📋 Link</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleUser('${u.uuid}',${!u.active})">${u.active?'Disable':'Enable'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.uuid}','${esc(u.name)}')">✕</button>
      </div></td>
    </tr>
  `).join('');
}

function showAddModal(){
  document.getElementById('newUserName').value='';
  document.getElementById('addModal').classList.add('show');
  document.getElementById('newUserName').focus();
}

async function addUser(){
  const name=document.getElementById('newUserName').value.trim();
  if(!name)return toast('Name is required',true);
  const r=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
  if(r.ok){closeModal('addModal');loadUsers();toast('User created');}
  else{const d=await r.json();toast(d.error||'Failed',true);}
}

async function deleteUser(id,name){
  if(!confirm('Delete "'+name+'"?'))return;
  const r=await fetch('/api/users/'+id,{method:'DELETE'});
  if(r.ok){loadUsers();toast('User deleted');}
}

async function toggleUser(id,active){
  await fetch('/api/users/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({active})});
  loadUsers();
}

// --- Link ---
function showLink(uuid,name){
  linkUuid=uuid; linkName=name;
  const sniSel=document.getElementById('linkSni');
  const hostSel=document.getElementById('linkHost');
  sniSel.innerHTML=(settings.sniList||[]).map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  hostSel.innerHTML=(settings.hostUrls||[]).map(h=>`<option value="${esc(h)}">${esc(h)}</option>`).join('');
  document.getElementById('linkCdn').value=settings.cdnAddress||'m.googleapis.com';
  updateLink();
  document.getElementById('linkModal').classList.add('show');
}

function updateLink(){
  const cdn=settings.cdnAddress||'m.googleapis.com';
  const sni=document.getElementById('linkSni').value;
  const host=document.getElementById('linkHost').value;
  const link=`vless://${linkUuid}@${cdn}:443?path=%2F&security=tls&encryption=none&host=${host}&type=ws&sni=${sni}#${encodeURIComponent(linkName)}`;
  document.getElementById('linkBox').textContent=link;
}

document.addEventListener('change',e=>{if(e.target.id==='linkSni'||e.target.id==='linkHost')updateLink();});

function copyLink(){
  navigator.clipboard.writeText(document.getElementById('linkBox').textContent).then(()=>toast('Link copied!'));
}

// --- Helpers ---
function closeModal(id){document.getElementById(id).classList.remove('show');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' error':'');setTimeout(()=>t.className='toast',2500);}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')}));
init();
</script>
</body>
</html>
